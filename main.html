<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Example</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
	<h1>Feedback Form</h1>
  <form method="POST" action="#">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" minlength="3" maxlength="50" required />
    <br />

    <label for="portfolio">Portfolio:</label>
    <input type="url" id="portfolio" name="portfolio" required />
    <br />

    <label for="favColor">Favorite Color:</label>
    <input type="color" id="favColor" name="favColor" required />
    <br />

    <label for="likeness">Likeness:</label>
    <input type="range" id="likeness" name="likeness" min="1" max="100" required />
    <br />

    <button type="submit">Submit</button>
  </form>

  <script src="./script.js"></script>
</body>
</html>
